<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1st lesion</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div x-data="{count:0}">
      <p>The value of count is <span x-text="count"></span></p>
      <button x-on:click="count++">+</button>
    </div>

    <div x-data="{name:'Mugdha', age:25}">
      <p>
        Hello everyone,
        <br />
        My name in <span x-text="name"></span>. I am
        <span x-text="age"></span> years old
      </p>
    </div>
  </body>
</html>
